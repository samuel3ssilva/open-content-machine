<text x="34" y="63" font-size="13" fill="#a3be8c">content-machine audience anonymize examples/synthetic-connections.csv \</text>
<text x="18" y="82" font-size="13" fill="#d8dee9" xml:space="preserve">    --output anonymized.json</text>
