name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests schemas

      - name: Type check (mypy)
        run: mypy src

      - name: Test (pytest)
        run: pytest -q

      - name: Release security checklist
        run: |
          set -uo pipefail
          fail=0

          echo "== 1. Tracked private-data-shaped filenames (SECURITY.md #2) =="
          if git ls-files | grep -Ei '(^|/)\.env$|connections.*\.csv|secret|credential|\.pem$|\.key$' \
              | grep -v -E 'examples/synthetic-connections\.csv|\.env\.example'; then
            echo "FAIL: private-data-shaped filename(s) are tracked (see above)"
            fail=1
          else
            echo "OK: no private-data-shaped filenames tracked"
          fi

          echo "== 2. Secret-shaped literals in tracked content (SECURITY.md #3) =="
          if git grep -nIE '(api[_-]?key|token|password)\s*[:=]\s*["'"'"'][A-Za-z0-9_\-]{16,}' -- .; then
            echo "FAIL: possible secret literal found (see above)"
            fail=1
          else
            echo "OK: no secret-shaped literals found"
          fi

          echo "== 3. Non-example email addresses in tracked content (SECURITY.md #3) =="
          # NOTE: SECURITY.md documents this scan with `grep -E` and a
          # negative-lookahead pattern, which is not valid POSIX extended
          # regex and fails with "repetition-operator operand invalid" under
          # plain -E. `-P` (PCRE) is required for the lookahead to work.
          if git grep -nIP '[A-Za-z0-9._%+-]+@(?!example\.com|example\.org|users\.noreply\.github\.com)[A-Za-z0-9.-]+\.[A-Za-z]{2,}' -- .; then
            echo "FAIL: possible non-example email address found (see above)"
            fail=1
          else
            echo "OK: no non-example email addresses found"
          fi

          if [ "$fail" -ne 0 ]; then
            echo "Release security checklist FAILED"
            exit 1
          fi
          echo "Release security checklist passed"
